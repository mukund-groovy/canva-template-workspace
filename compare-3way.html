<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Original → Author → Remix</title>
<style>
  :root{
    --bg:#0d1017; --panel:#141922; --brd:#232b39; --ink:#e8edf6; --dim:#8b97ab;
    --orig:#6ea8fe; --auth:#7ee0a8; --remix:#f0a868;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font:15px/1.5 system-ui,Segoe UI,sans-serif;padding:40px}
  h1{font-size:26px;letter-spacing:-.02em}
  .sub{color:var(--dim);margin:6px 0 34px}
  .deck{margin-bottom:56px;border:1px solid var(--brd);border-radius:14px;background:var(--panel);padding:26px}
  .deck > h2{font-size:19px;margin-bottom:4px}
  .deck > .meta{color:var(--dim);font-size:13px;margin-bottom:20px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px;font-size:13px}
  .tag{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border:1px solid var(--brd);border-radius:999px}
  .dot{width:9px;height:9px;border-radius:50%}
  .row{display:grid;grid-template-columns:64px repeat(3,1fr);gap:16px;align-items:start;margin-bottom:16px}
  .n{color:var(--dim);font-size:13px;text-align:right;padding-top:8px;font-variant-numeric:tabular-nums}
  figure{margin:0}
  figure img{width:100%;display:block;border:1px solid var(--brd);border-radius:8px;background:#fff;cursor:zoom-in}
  figure img:hover{border-color:#4a5872}
  figcaption{color:var(--dim);font-size:12px;margin-top:6px;display:flex;align-items:center;gap:6px}
  .hdr{position:sticky;top:0;background:var(--panel);padding:10px 0 12px;z-index:2}
  .hdr .row{margin-bottom:0}
  .hdr b{font-size:13px;letter-spacing:.04em;text-transform:uppercase}
  .miss{border:1px dashed var(--brd);border-radius:8px;color:var(--dim);font-size:12px;
        display:flex;align-items:center;justify-content:center;aspect-ratio:4/5}
  dialog{border:none;background:transparent;max-width:96vw;max-height:96vh;padding:0}
  dialog::backdrop{background:rgba(4,6,10,.9)}
  dialog img{max-width:96vw;max-height:96vh;border-radius:10px;display:block}
</style>
</head>
<body>
<h1>Original → Author → Remix</h1>
<p class="sub">Two Canva references, each rebuilt twice: the <b>author</b> agent reproduces it faithfully, the <b>remix</b> agent keeps its design language but invents the content. Click any slide to enlarge.</p>

<div class="deck" id="d1"></div>
<div class="deck" id="d2"></div>

<dialog id="zoom"><img alt=""/></dialog>

<script>
const DECKS = [
  {
    el: 'd1',
    title: 'DAHOrBKyBxs — Purple Minimalist Carousel',
    meta: '7 slides · 0 photos · reference fonts Arimo / Poppins',
    refDir: 'designs/DAHOrBKyBxs/extract/assets/pages',
    author: { slug: 'purple-minimalist-carousel', score: '8.2/10' },
    remix:  { slug: 'write-better-emails', score: '8.8/10', topic: 'invented topic: writing better email' },
    n: 7,
  },
  {
    el: 'd2',
    title: 'DAHPRMKHicM — White & Black Minimalist "How to Become"',
    meta: '5 slides · 0 photos · reference fonts Arimo / Times New Roman MT Condensed / Open Sauce',
    refDir: 'designs/DAHPRMKHicM/extract/assets/pages',
    author: { slug: 'how-to-become', score: 'faithful' },
    remix:  { slug: 'the-drawn-line', score: '10/10', topic: 'invented topic: architectural drafting' },
    n: 5,
  },
];

const pad = (i) => String(i).padStart(2, '0');
const img = (src, cap, colour) =>
  `<figure><img loading="lazy" src="${src}" alt="${cap}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'miss',textContent:'not rendered'}))"/>
   <figcaption><span class="dot" style="background:${colour}"></span>${cap}</figcaption></figure>`;

for (const d of DECKS) {
  let html = `<h2>${d.title}</h2><div class="meta">${d.meta}</div>
    <div class="legend">
      <span class="tag"><span class="dot" style="background:var(--orig)"></span> Original — the Canva reference</span>
      <span class="tag"><span class="dot" style="background:var(--auth)"></span> Author — faithful repro · ${d.author.slug} · ${d.author.score}</span>
      <span class="tag"><span class="dot" style="background:var(--remix)"></span> Remix — same design language, own content · ${d.remix.slug} · ${d.remix.score}</span>
    </div>
    <div class="hdr"><div class="row"><div></div>
      <div><b style="color:var(--orig)">Original</b></div>
      <div><b style="color:var(--auth)">Author</b></div>
      <div><b style="color:var(--remix)">Remix</b></div>
    </div></div>`;
  for (let i = 1; i <= d.n; i++) {
    html += `<div class="row"><div class="n">${pad(i)}</div>
      ${img(`${d.refDir}/page-${pad(i)}-thumbnail.png`, 'reference', 'var(--orig)')}
      ${img(`.renders/output/${d.author.slug}/slide-${pad(i)}.png`, d.author.slug, 'var(--auth)')}
      ${img(`.renders/output/${d.remix.slug}/slide-${pad(i)}.png`, d.remix.slug, 'var(--remix)')}
    </div>`;
  }
  document.getElementById(d.el).innerHTML = html;
}

const zoom = document.getElementById('zoom');
document.addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG' && e.target.closest('figure')) {
    zoom.querySelector('img').src = e.target.src;
    zoom.showModal();
  } else if (e.target.closest('dialog')) zoom.close();
});
</script>
</body>
</html>
