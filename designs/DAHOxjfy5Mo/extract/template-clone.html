<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Canva Template Clone</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0b0b0b;color:#f5f5f5;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;display:grid;grid-template-columns:88px 1fr;min-height:100vh}
.rail{position:sticky;top:0;height:100vh;padding:18px 10px;border-right:1px solid #1f1f1f;background:#101010;display:flex;flex-direction:column;gap:10px;align-items:center}
.rail a{width:34px;height:34px;border-radius:50%;border:1px solid #333;color:#ddd;text-decoration:none;display:grid;place-items:center;font-size:13px;background:#181818}
.main{padding:22px;display:grid;gap:30px;justify-content:center}
.slide-wrap{width:min(1080px,calc(100vw - 150px))}
.slide{width:100%;aspect-ratio:4/5;background:#111;border:1px solid #222;box-shadow:0 22px 50px rgba(0,0,0,.45);overflow:hidden}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.caption{margin-top:8px;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:#a9a9a9}
@media (max-width:840px){body{grid-template-columns:1fr}.rail{position:sticky;z-index:5;top:0;height:auto;flex-direction:row;justify-content:center;border-right:none;border-bottom:1px solid #1f1f1f}.main{padding:14px}.slide-wrap{width:100%}}
</style>
</head>
<body>
  <nav class="rail" aria-label="Slide navigation"><a href="#slide-1">1</a><a href="#slide-2">2</a><a href="#slide-3">3</a><a href="#slide-4">4</a><a href="#slide-5">5</a></nav>
  <main class="main"><section class="slide-wrap" id="slide-1">
  <div class="slide" aria-label="Slide 1">
    <img src="./assets/pages/page-01-actual.png" alt="Template slide 1" loading="lazy" decoding="async" />
  </div>
  <div class="caption">Slide 1</div>
</section>
<section class="slide-wrap" id="slide-2">
  <div class="slide" aria-label="Slide 2">
    <img src="./assets/pages/page-02-actual.png" alt="Template slide 2" loading="lazy" decoding="async" />
  </div>
  <div class="caption">Slide 2</div>
</section>
<section class="slide-wrap" id="slide-3">
  <div class="slide" aria-label="Slide 3">
    <img src="./assets/pages/page-03-actual.png" alt="Template slide 3" loading="lazy" decoding="async" />
  </div>
  <div class="caption">Slide 3</div>
</section>
<section class="slide-wrap" id="slide-4">
  <div class="slide" aria-label="Slide 4">
    <img src="./assets/pages/page-04-actual.png" alt="Template slide 4" loading="lazy" decoding="async" />
  </div>
  <div class="caption">Slide 4</div>
</section>
<section class="slide-wrap" id="slide-5">
  <div class="slide" aria-label="Slide 5">
    <img src="./assets/pages/page-05-actual.png" alt="Template slide 5" loading="lazy" decoding="async" />
  </div>
  <div class="caption">Slide 5</div>
</section></main>
</body>
</html>
