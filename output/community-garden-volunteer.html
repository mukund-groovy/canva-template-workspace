<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Dancing+Script:wght@600;700&family=Lora:wght@400;500&display=swap');

:root{
  --primary:var(--brand-primary,#6E5A46);
  --secondary:var(--brand-secondary,#4A3F30);
  --accent:var(--brand-accent,#8A9A5B);
  --bg:var(--brand-bg,#EFEAE0);
  --surface:var(--brand-surface,#F5F1E8);
  --text-high:var(--brand-ink,#2E2A22);
  --text-low:var(--brand-text-muted,rgba(46,42,34,.6));
  --border:var(--brand-border,rgba(46,42,34,.22));
  --highlight:var(--brand-accent,#8A9A5B);
  --on-accent:#F7F4EC;
}

*{box-sizing:border-box;}

.si-single{width:fit-content;margin:0;background:#0c0c0c;}

.si-page{
  position:relative;width:1080px;height:1350px;overflow:hidden;
  container-type:inline-size;
  background:
    radial-gradient(circle at 20% 15%, color-mix(in srgb,var(--surface) 60%,transparent) 0 2px, transparent 3px),
    radial-gradient(circle at 70% 60%, color-mix(in srgb,var(--primary) 8%,transparent) 0 2px, transparent 3px),
    var(--bg);
  background-size:140px 140px, 190px 190px, auto;
  font-family:'Lora',serif;
  padding:70px 70px 40px;
  display:flex;flex-direction:column;
}

.si-image{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  object-fit:cover;
  display:block;
  border-radius:2px;
}

.arc-band{
  position:relative;
  height:0;
  z-index:5;
}
.arc-wrap{
  position:absolute;
  left:-70px;right:-70px;
  top:-58px;
  height:150px;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.arc-paper{
  position:absolute;left:8%;right:8%;top:44px;height:62px;
  background:var(--accent);
  transform:rotate(-4deg);
  clip-path:polygon(0 30%,4% 10%,10% 34%,17% 8%,24% 40%,31% 12%,38% 36%,46% 6%,53% 38%,61% 14%,68% 40%,75% 8%,82% 36%,90% 12%,96% 38%,100% 20%,100% 78%,95% 96%,88% 66%,80% 94%,72% 62%,64% 92%,56% 66%,48% 96%,40% 64%,32% 92%,24% 62%,16% 96%,9% 66%,3% 90%,0 72%);
  box-shadow:0 6px 14px rgba(46,42,34,.15);
}

.text-block{
  z-index:6;
  margin-top:34px;
  display:flex;flex-direction:column;
  gap:14px;
  text-align:center;
  align-items:center;
}
.arc-label{
  font-family:'Oswald',sans-serif;
  font-weight:600;
  font-size:clamp(20px,2.4cqw,30px);
  letter-spacing:4px;
  color:var(--on-accent);
  text-transform:uppercase;
  white-space:nowrap;
  background:var(--secondary);
  padding:12px 34px 14px;
  border-radius:4px;
  margin:0 0 4px;
}
.eyebrow{
  font-family:'Oswald',sans-serif;font-weight:500;
  font-size:clamp(14px,1.6cqw,18px);letter-spacing:6px;text-transform:uppercase;
  color:var(--secondary);
  margin:0;padding-bottom:2px;
}
.headline{
  margin:0;
  font-family:'Oswald',sans-serif;font-weight:600;
  font-size:clamp(30px,4cqw,46px);line-height:1.16;letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--text-high);
  max-width:820px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;
  padding-bottom:6px;
}
.body{
  margin:0;
  font-family:'Lora',serif;font-weight:400;
  font-size:clamp(16px,1.9cqw,21px);line-height:1.45;
  color:var(--text-low);
  max-width:640px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;
  padding-bottom:4px;
}

.footer{
  margin-top:auto;
  padding-top:22px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:14px;
}
.brand-word{
  font-family:'Oswald',sans-serif;font-weight:600;
  font-size:clamp(18px,2.2cqw,26px);letter-spacing:2px;text-transform:uppercase;
  color:var(--primary);
}
.brand-mark{height:30px;width:auto;max-width:110px;object-fit:contain;display:block;}
.cta{
  font-family:'Dancing Script',cursive;font-weight:700;
  font-size:clamp(30px,3.6cqw,42px);
  color:var(--secondary);text-decoration:none;
  line-height:1.1;padding-bottom:6px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
}

/* occlusion-guard: semantic text slots always render above filled surfaces */
[data-title],[data-message],[data-cta],[data-tagline],[data-step],[data-kicker]{position:relative;z-index:30;}
</style>
</head>
<body>
<div class="si-single">
  <div class="si-page">

    <img class="si-image" data-image="true" data-image-size="1024x1536" alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='5'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23d8d3c8'/><stop offset='0.5' stop-color='%239a9384'/><stop offset='1' stop-color='%235d5747'/></linearGradient></defs><rect width='100%25' height='100%25' fill='url(%23g)'/></svg>">

    <div class="arc-band" aria-hidden="true">
      <div class="arc-wrap">
        <div class="arc-paper"></div>
      </div>
    </div>

    <div class="text-block">
      <span class="arc-label">Grow • Gather • Give Back</span>
      <p class="eyebrow">Volunteer Weekend</p>
      <h1 class="headline">Growing greener spaces together this season</h1>
      <p class="body">Join neighbors for a hands-on weekend of planting, weeding, and sharing tips. All tools provided, no experience needed to help.</p>
    </div>

    <div class="footer">
      <img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='110' height='30'><rect width='100%25' height='100%25' fill='%23b9b3a8'/></svg>">
      <span class="brand-word">GREENROOTS</span>
      <a class="cta" href="#">@greenroots</a>
    </div>

  </div>
</div>

</body></html>
