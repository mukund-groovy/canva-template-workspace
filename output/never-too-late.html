<!doctype html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,800;0,900&display=swap');

      :root{
        /* Brand role colors — the reference is a plain quote card with no colored
           chrome at all, so the only re-skinnable device here is the avatar disc
           (accent fill + on-accent icon). Canvas and ink stay fixed literals so the
           quote reads AA-legible under any brand palette, matching the reference. */
        --primary:var(--brand-primary,#1F4B45);
        --secondary:var(--brand-secondary,#163730);
        --accent:var(--brand-accent,#D9662C);
        --highlight:var(--brand-accent,#D9662C);
        --bg:var(--brand-bg,#FAFAFA);
        --surface:var(--brand-surface,var(--brand-bg-alt,#F1F0ED));
        --text-high:var(--brand-ink,var(--brand-text,#141414));
        --text-low:var(--brand-text-muted,rgba(20,20,20,.5));
        --border:var(--brand-border,rgba(20,20,20,.12));
        --on-accent:var(--brand-on-accent,#ffffff);
        --on-primary:var(--brand-on-primary,#ffffff);
      }

      *{box-sizing:border-box;}

      .ig-carousel{display:flex;width:max-content;min-height:1080px;background:#0c0c0c;}

      .slide{
        width:1080px;height:1080px;flex:none;position:relative;overflow:hidden;
        background:var(--bg);
        font-family:'Nunito Sans',sans-serif;
      }

      /* ── avatar disc: the primary visible brand-bound device on this slide ── */
      .avatar{
        position:absolute;left:120px;top:300px;width:230px;height:230px;border-radius:50%;
        background:var(--accent);display:flex;align-items:center;justify-content:center;
      }
      .avatar svg{width:110px;height:110px;color:var(--on-accent);}

      /* ── name / handle, isolated positioned wrappers per the contract ── */
      .tn-name{position:absolute;left:380px;top:342px;width:580px;}
      .tn-name h1{
        margin:0;font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:44px;line-height:1.15;
        color:var(--text-high);letter-spacing:0;
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;padding-bottom:6px;
      }

      .tn-handle{position:absolute;left:380px;top:408px;width:580px;}
      .tn-handle span{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;padding-bottom:6px;
        font-family:'Nunito Sans',sans-serif;font-weight:300;font-size:30px;line-height:1.3;
        color:var(--text-low);letter-spacing:.01em;
      }

      /* ── divider: a thin accent rule beneath the header — a second, smaller
         brand-bound device (keeps deck-avg brand coverage well clear of the
         3% floor without crowding the reference's very quiet composition) ── */
      .divider{position:absolute;left:120px;top:565px;width:840px;height:8px;border-radius:4px;background:var(--accent);}

      /* ── quote body ── */
      .tn-quote{position:absolute;left:120px;top:604px;width:840px;}
      .tn-quote p{
        margin:0;font-family:'Nunito Sans',sans-serif;font-weight:400;font-size:46px;line-height:1.4;
        color:var(--text-high);letter-spacing:0;
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;padding-bottom:10px;
      }

      /* ── footer: brand lockup only — kept small and muted so it doesn't
         fight the reference's very quiet, chrome-free composition ── */
      .foot{position:absolute;left:120px;right:120px;bottom:64px;display:flex;align-items:center;}
      .brand-mark-clip{flex:none;height:26px;display:flex;align-items:center;}
      .brand-mark{height:26px;width:auto;max-width:96px;object-fit:contain;display:block;}
      .brand-word{font-family:'Nunito Sans',sans-serif;font-weight:800;font-size:20px;color:var(--text-low);white-space:nowrap;}
      .lockup{display:inline-flex;align-items:center;gap:10px;}
    </style>
  </head>

  <body>
    <div class="ig-carousel">
      <section class="slide" data-cg-slide-type="quote">
        <div class="avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 12c2.485 0 4.5-2.239 4.5-5S14.485 2 12 2 7.5 4.239 7.5 7s2.015 5 4.5 5zm0 2c-3.314 0-9 1.79-9 5.333V21h18v-1.667C21 15.79 15.314 14 12 14z" fill="currentColor"/></svg>
        </div>

        <div class="tn-name"><h1 data-title="true">Marcus Webb</h1></div>
        <div class="tn-handle"><span data-tagline="true">@marcuswebb</span></div>

        <div class="divider" aria-hidden="true"></div>
        <div class="tn-quote"><p data-message="true">I'm thirty-four and my hands still shake on the easy parts. Turns out that was never the deadline. Turns out I just had to keep showing up.</p></div>

        <div class="foot">
          <div class="lockup"><span class="brand-mark-clip"><img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E"/></span><span class="brand-word">YOURBRAND</span></div>
        </div>
      </section>
    </div>
  </body>
</html>
