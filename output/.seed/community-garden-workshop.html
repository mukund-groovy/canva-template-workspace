<!doctype html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@400;500&display=swap');

:root{
  --primary:var(--brand-primary,#8A5B5B);
  --secondary:var(--brand-secondary,#6E4646);
  --accent:var(--brand-accent,#A06E6E);
  --bg:var(--brand-bg,#EFE3DC);
  --surface:var(--brand-surface,#E4D3C9);
  --text-high:var(--brand-ink,#2A2320);
  --text-low:var(--brand-text-muted,rgba(42,35,32,.62));
  --border:var(--brand-border,rgba(42,35,32,.14));
  --highlight:var(--brand-accent,#A06E6E);
  --on-accent:var(--brand-on-accent,#ffffff);
  --on-primary:var(--brand-on-primary,#ffffff);
}

*{box-sizing:border-box;}

.si-single{width:fit-content;margin:0;}

.si-page{
  position:relative;width:1080px;height:1080px;overflow:hidden;
  container-type:inline-size;
  background:var(--bg);
  font-family:'Jost',sans-serif;
  display:flex;flex-direction:column;
  padding:110px 88px 80px;
}

.si-eyebrow{
  font-family:'Jost',sans-serif;font-weight:500;font-size:clamp(15px,1.8cqw,21px);
  letter-spacing:.34em;text-transform:uppercase;color:var(--secondary);
  margin:0 0 40px;padding-bottom:2px;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
}

.headline{
  margin:0;flex:0 0 auto;
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(60px,9.2cqw,104px);line-height:1.1;
  letter-spacing:.005em;text-transform:uppercase;color:var(--text-high);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:6;overflow:hidden;
  padding-bottom:14px;
}
.headline .hl{color:var(--primary);}

.rule{
  height:3px;width:120px;background:var(--accent);border:0;margin:44px 0 0;
  flex:0 0 auto;
}

.panel{
  margin-top:40px;flex:0 0 auto;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:36px 40px;
}
.panel .body{
  margin:0;
  font-family:'Jost',sans-serif;font-weight:400;font-size:clamp(20px,2.4cqw,28px);
  line-height:1.5;color:var(--text-high);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;
  padding-bottom:4px;
}

.spacer{flex:1 1 auto;}

.cta{
  align-self:center;text-decoration:none;
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--accent);border-radius:999px;padding:22px 50px;
}
.cta span{
  font-family:'Jost',sans-serif;font-weight:600;font-size:25px;line-height:1.3;
  color:var(--on-accent);letter-spacing:.03em;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
  padding-bottom:.15em;
}

.lockup{align-self:center;display:inline-flex;align-items:center;gap:12px;margin-top:26px;}
.brand-mark{height:22px;width:auto;max-width:80px;object-fit:contain;display:block;opacity:.6;}
.brand-word{font-family:'Jost',sans-serif;font-weight:500;font-size:clamp(13px,1.5cqw,17px);letter-spacing:.28em;text-transform:uppercase;color:var(--secondary);white-space:nowrap;}

/* occlusion-guard: semantic text slots always render above filled surfaces */
[data-title],[data-message],[data-cta],[data-tagline],[data-step],[data-kicker]{position:relative;z-index:30;}
</style>
</head>
<body>
<div class="si-single">
  <div class="si-page">
    <p class="si-eyebrow">Community Gardening Workshop</p>
    <h1 class="headline">Learn how we grow a <span class="hl">hundred kinds</span> of <span class="hl">vegetables.</span></h1>
    <hr class="rule" aria-hidden="true">
    <div class="panel"><p class="body">Join our seasonal sessions on soil, seeds and sustainable harvests — hands in the earth, community at the table.</p></div>
    <div class="spacer" aria-hidden="true"></div>
    <a class="cta" href="#"><span data-cta>Reserve your plot today</span></a>
    <span class="lockup"><img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E"/><span class="brand-word">YOURBRAND</span></span>
  </div>
</div>
</body>
</html>
