<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Inter:wght@400;500;600&display=swap');

:root{
  --primary:var(--brand-primary,#C1443A);
  --secondary:var(--brand-secondary,#8A2F28);
  --accent:var(--brand-accent,#E05A4E);
  --bg:var(--brand-bg,#1C1A18);
  --surface:var(--brand-surface,rgba(20,18,16,0.42));
  --text-high:var(--brand-ink,#F4F1EC);
  --text-low:var(--brand-text-muted,rgba(244,241,236,0.62));
  --border:var(--brand-border,rgba(244,241,236,0.55));
  --highlight:var(--brand-accent,#E05A4E);
  --on-accent:#ffffff;
}

*{box-sizing:border-box;}

.si-single{width:fit-content;margin:0;}

.si-page{
  position:relative;
  width:1080px;height:1350px;
  container-type:inline-size;
  overflow:hidden;
  background:var(--bg);
  font-family:'Inter',sans-serif;
}

.hero-photo{position:absolute;inset:0;z-index:0;}
.hero-photo img{width:100%;height:100%;object-fit:cover;display:block;background:#2a2724;}

.scrim{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,
    color-mix(in srgb, var(--bg) 30%, transparent) 0%,
    color-mix(in srgb, var(--bg) 20%, transparent) 42%,
    color-mix(in srgb, var(--bg) 70%, transparent) 78%,
    color-mix(in srgb, var(--bg) 88%, transparent) 100%);
}

.chat{
  position:relative;z-index:2;
  height:100%;
  display:flex;flex-direction:column;
  align-items:flex-end;justify-content:flex-end;
  gap:18px;
  padding:0 56px 120px 56px;
}

.eyebrow-row{
  display:flex;align-items:center;gap:12px;
  align-self:center;
  margin-bottom:auto;margin-top:64px;
  padding:10px 22px;border-radius:100px;
  background:var(--primary);
  border:1px solid var(--secondary);
}
.eyebrow{
  margin:0;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:clamp(15px,1.6cqw,19px);letter-spacing:.18em;text-transform:uppercase;
  color:var(--on-accent);white-space:nowrap;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
}
.eyebrow-row svg{width:16px;height:16px;color:var(--on-accent);flex:none;}

.quote{
  align-self:center;text-align:center;max-width:820px;
  margin-top:52px;
}
.quote p{
  margin:0;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:clamp(34px,4.6cqw,58px);line-height:1.16;
  color:var(--text-high);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;padding-bottom:6px;
  text-shadow:0 4px 24px rgba(0,0,0,.4);
}
.quote span{
  display:block;margin-top:20px;
  font-family:'Inter',sans-serif;font-weight:500;
  font-size:clamp(16px,1.7cqw,21px);letter-spacing:.14em;text-transform:uppercase;
  color:color-mix(in srgb, var(--accent) 45%, var(--text-high) 55%);
}

.session-strip{
  align-self:center;margin-top:36px;margin-bottom:auto;
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center;
}
.session-chip{
  display:inline-flex;align-items:center;gap:10px;
  padding:12px 22px;border-radius:100px;
  border:1.5px solid var(--border);
  background:color-mix(in srgb, var(--bg) 55%, transparent);
  font-family:'Inter',sans-serif;font-weight:600;
  font-size:clamp(15px,1.6cqw,20px);color:var(--text-high);white-space:nowrap;
}
.session-chip svg{width:18px;height:18px;color:var(--accent);flex:none;}

.row{display:flex;align-items:flex-end;gap:14px;max-width:640px;}
.row.right{align-self:flex-end;flex-direction:row;}
.row.left{align-self:flex-start;flex-direction:row-reverse;}

.avatar{
  width:56px;height:56px;flex:none;border-radius:50%;overflow:hidden;
  border:2px solid var(--accent);
}
.avatar span{width:100%;height:100%;display:block;background:var(--secondary);}

.bubble{
  position:relative;
  padding:22px 30px;border-radius:26px;
  border:1.5px solid var(--border);
  background:color-mix(in srgb, var(--bg) 60%, transparent);
  backdrop-filter:blur(3px);
}
.bubble p{
  margin:0;font-family:'Inter',sans-serif;font-weight:500;
  font-size:clamp(20px,2.3cqw,28px);line-height:1.28;
  color:var(--text-high);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;padding-bottom:3px;
}

.headline-bubble{
  background:var(--primary);
  border-color:var(--secondary);
}
.headline-bubble .headline{
  margin:0;font-family:'Poppins',sans-serif;font-weight:600;
  font-size:clamp(24px,2.7cqw,33px);line-height:1.24;text-align:right;
  color:var(--on-accent);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;padding-bottom:4px;
}

.react{
  position:absolute;left:22px;bottom:-16px;
  width:40px;height:40px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 14px rgba(0,0,0,.35);
}
.react svg{width:20px;height:20px;color:var(--on-accent);}

.timestamp{
  align-self:flex-end;margin-top:2px;margin-right:14px;
  font-family:'Inter',sans-serif;font-weight:400;
  font-size:clamp(14px,1.5cqw,18px);color:var(--text-low);
  white-space:nowrap;
}

.cta{
  align-self:flex-start;margin-top:6px;
  display:inline-flex;align-items:center;gap:12px;
  padding:20px 34px;border-radius:100px;
  background:var(--primary);
  font-family:'Poppins',sans-serif;font-weight:600;
  font-size:clamp(19px,2.1cqw,26px);color:var(--on-accent);
  text-decoration:none;white-space:nowrap;
  box-shadow:0 10px 26px rgba(0,0,0,.32);
}
.cta svg{width:20px;height:20px;color:var(--on-accent);}

.lockup{
  position:absolute;left:56px;bottom:44px;z-index:3;
  display:inline-flex;align-items:center;gap:12px;
}
.brand-mark{height:30px;width:auto;max-width:110px;object-fit:contain;display:block;}
.brand-word{font-family:'Poppins',sans-serif;font-weight:600;font-size:24px;color:var(--text-high);white-space:nowrap;}

/* occlusion-guard: semantic text slots always render above filled surfaces */
[data-title],[data-message],[data-cta],[data-tagline],[data-step],[data-kicker]{position:relative;z-index:30;}
</style>
</head>
<body>
<div class="si-single">
  <div class="si-page">
    <img class="si-image" data-image="true" data-image-size="1024x1536" data-image-prompt="Moody low-key portrait photo, cropped torso and shoulder of an athletic person in dark workout gear standing in a dim gym, side lighting, deep charcoal shadows, cinematic grain, no text, no logos" alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='5'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23050403'/><stop offset='0.45' stop-color='%23524941'/><stop offset='0.75' stop-color='%231a1512'/><stop offset='1' stop-color='%23020201'/></linearGradient></defs><rect width='100%25' height='100%25' fill='url(%23g)'/></svg>" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#2a2724;">
    <div class="scrim" aria-hidden="true"></div>

    <div class="chat">
      <div class="eyebrow-row">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" data-cg-svg="" data-cg-preserve="" focusable="false" style="--cg-fill:var(--on-accent);--cg-stroke:var(--on-accent);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)"><path d="M4 5h16v11H8l-4 3V5Z" stroke="var(--cg-stroke)" stroke-width="2" stroke-linejoin="round"></path></svg>
        <span class="eyebrow">Coaching Chat</span>
      </div>

      <div class="quote">
        <p>Every strong week starts with one small booking.</p>
        <span>Your Coach, Ready When You Are</span>
      </div>

      <div class="session-strip">
        <span class="session-chip"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true" data-cg-svg="" data-cg-preserve="" focusable="false" style="--cg-fill:var(--text-high);--cg-stroke:var(--text-high);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)"><rect x="3" y="5" width="18" height="16" rx="2" stroke="var(--cg-stroke)" stroke-width="2"></rect><path d="M3 9h18M8 3v4M16 3v4" stroke="var(--cg-stroke)" stroke-width="2" stroke-linecap="round"></path></svg>Mon &amp; Thu</span>
        <span class="session-chip"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true" data-cg-svg="" data-cg-preserve="" focusable="false" style="--cg-fill:var(--text-high);--cg-stroke:var(--text-high);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)"><circle cx="12" cy="12" r="9" stroke="var(--cg-stroke)" stroke-width="2"></circle><path d="M12 7v5l3 2" stroke="var(--cg-stroke)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>45 min slots</span>
        <span class="session-chip"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true" data-cg-svg="" data-cg-preserve="" focusable="false" style="--cg-fill:var(--text-high);--cg-stroke:var(--text-high);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)"><path d="M4 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" stroke="var(--cg-stroke)" stroke-width="2" stroke-linecap="round"></path><circle cx="10" cy="8" r="4" stroke="var(--cg-stroke)" stroke-width="2"></circle></svg>1:1 with coach</span>
      </div>

      <div class="row right">
        <div class="bubble"><p>Hi coach!</p></div>
        <span class="avatar"><span></span></span>
      </div>

      <div class="row right">
        <div class="bubble headline-bubble">
          <h1 class="headline">Can I book a strength session for Monday?</h1>
          <span class="react"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" data-cg-svg="" data-cg-preserve="" focusable="false"><path d="M12 21s-7-4.35-9.5-8.5C.9 9.7 2.2 6 5.5 6c2 0 3.2 1.3 4 2.3.8-1 2-2.3 4-2.3 3.3 0 4.6 3.7 3 6.5C19 16.65 12 21 12 21Z"></path></svg></span>
        </div>
        <span class="avatar"><span></span></span>
      </div>

      <span class="timestamp">read 2 minutes ago</span>

      <div class="row left">
        <div class="bubble"><p>Great choice — Monday works!</p></div>
        <span class="avatar"><span></span></span>
      </div>

      <a class="cta" href="#">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" data-cg-svg="" data-cg-preserve="" focusable="false" style="--cg-fill:var(--on-accent);--cg-stroke:var(--on-accent);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)"><path d="M20 6 9 17l-5-5" stroke="var(--cg-stroke)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        Absolutely, let's begin!
      </a>
    </div>

    <div class="lockup">
      <img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E">
      <span class="brand-word">YOURBRAND</span>
    </div>
  </div>
</div>

</body></html>
