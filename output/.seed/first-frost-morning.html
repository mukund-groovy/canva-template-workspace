<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&family=DM+Sans:wght@700&display=swap');

      :root{
        /* Brand role colors — the brand preview re-skins ONLY the accent roles
           (--primary/--secondary/--accent). The frosted quote panel is the sole
           visible brand-bound device on this single-slide card: its fill is a
           blend of --accent/--primary, so it tints under every brand palette.
           Canvas photo + ink stay fixed literals for guaranteed legibility. */
        --primary:var(--brand-primary,#28384A);
        --secondary:var(--brand-secondary,#4F6B85);
        --accent:var(--brand-accent,#8AA2C4);
        --highlight:var(--brand-accent,#8AA2C4);
        --bg:var(--brand-bg,#EEF1F5);
        --surface:var(--brand-surface,var(--brand-bg-alt,#F6F4EE));
        --text-high:var(--brand-ink,var(--brand-text,#1E2833));
        --text-low:var(--brand-text-muted,rgba(30,40,51,.62));
        --border:var(--brand-border,rgba(30,40,51,.14));
        --on-fill:var(--brand-on-accent,#ffffff);
        --on-primary:var(--brand-on-primary,#ffffff);
      }

      *{box-sizing:border-box;}

      .ig-carousel{display:flex;width:max-content;min-height:1350px;background:#0c0c0c;}

      .slide{
        width:1080px;height:1350px;flex:none;position:relative;overflow:hidden;
        background:#a9b6c6;
        font-family:'Fira Sans',sans-serif;
      }

      /* ── full-bleed content photo ── */
      .photo{position:absolute;inset:0;z-index:0;}
      .photo img{width:100%;height:100%;object-fit:cover;display:block;background:#a9b6c6;}

      /* ── faint top haze so the frost-fern mark always reads against sky ── */
      .top-haze{
        position:absolute;left:0;right:0;top:0;height:460px;z-index:1;pointer-events:none;
        background:linear-gradient(180deg, rgba(10,14,20,.30) 0%, rgba(10,14,20,0) 100%);
      }

      /* ── decorative solitary mark, echoes the reference's single silhouette ── */
      .frost-mark{position:absolute;left:492px;top:238px;width:96px;height:96px;z-index:2;}
      .frost-mark svg{width:100%;height:100%;display:block;}

      /* ── the frosted-glass quote panel — the deck's one brand-bound fill.
         Blends --accent/--primary into the dark base so it visibly re-skins
         under every brand palette while staying dark enough to hold
         --on-fill text at AA. ── */
      .quote-panel{
        position:absolute;left:130px;top:552px;width:820px;height:316px;z-index:2;
        border-radius:30px;overflow:hidden;
        background:
          linear-gradient(158deg,
            color-mix(in srgb, var(--accent) 22%, #0a0e13 78%) 0%,
            color-mix(in srgb, var(--primary) 26%, #05070a 74%) 100%);
        box-shadow:0 30px 60px rgba(4,6,10,.38);
        backdrop-filter:blur(2px);
      }
      .quote-panel::after{
        content:'';position:absolute;inset:0;border-radius:30px;
        border:1px solid rgba(255,255,255,.16);pointer-events:none;
      }

      /* ── isolated positioned wrapper for the ONE text node — text stays in
         normal flow inside its own absolute box, per the exemplar contract ── */
      .tn-message{position:absolute;left:190px;top:598px;width:700px;z-index:3;}
      .tn-message p{
        margin:0;font-family:'Fira Sans',sans-serif;font-weight:500;font-size:31px;line-height:1.38;
        letter-spacing:.01em;text-align:center;text-transform:uppercase;color:#FBFAF7;
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;padding-bottom:.2em;
      }

      /* hand-drawn-style divider beneath the quote, matches the reference's
         squiggle underline; tinted to sit with the quote ink, not the fill */
      .quote-divider{position:absolute;left:470px;top:798px;width:140px;height:16px;z-index:3;}
      .quote-divider svg{width:100%;height:100%;display:block;}

      /* ── bottom scrim: guarantees the lockup reads against ANY generated
         photo, and carries real brand-primary/-accent coverage of its own ── */
      .bottom-scrim{
        position:absolute;left:0;right:0;bottom:0;height:270px;z-index:2;pointer-events:none;
        background:linear-gradient(180deg,
          transparent 0%,
          color-mix(in srgb, var(--primary) 24%, #05070a 76%) 52%,
          color-mix(in srgb, var(--accent) 30%, #05070a 70%) 100%);
      }

      .foot{position:absolute;left:0;right:0;bottom:52px;z-index:3;display:flex;align-items:center;justify-content:center;}
      .brand-mark-clip{flex:none;height:30px;display:flex;align-items:center;}
      .brand-mark{height:30px;width:auto;max-width:110px;object-fit:contain;display:block;}
      .brand-word{font-family:'DM Sans',sans-serif;font-weight:700;font-size:22px;letter-spacing:.04em;color:#F5EFE6;white-space:nowrap;}
      .lockup{display:inline-flex;align-items:center;gap:12px;}
    </style>
  </head>

  <body>
    <div class="ig-carousel">

      <section class="slide" data-cg-slide-type="quote">
        <div class="photo">
          <img data-image="true" data-image-size="1024x1536" alt="" data-image-prompt="Frost-covered bare tree branches against a soft lavender-blue winter dawn sky, delicate ice crystals catching pale early light, muted pastel gradient from dusty blue to blush, quiet aesthetic nature photography, gentle grain, no people, no text" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='5'><rect width='100%25' height='100%25' fill='%23a9b6c6'/></svg>">
        </div>
        <div class="top-haze" aria-hidden="true"></div>

        <div class="frost-mark" aria-hidden="true">
          <svg data-cg-svg="" data-cg-preserve="" viewBox="0 0 96 96" fill="none" aria-hidden="true" focusable="false" style="--cg-fill:var(--text-high);--cg-stroke:var(--text-high);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)">
            <g stroke="var(--cg-stroke)" stroke-width="2.6" stroke-linecap="round" opacity=".92">
              <path d="M48 6V90"></path>
              <path d="M12 48H84"></path>
              <path d="M21 21L75 75"></path>
              <path d="M75 21L21 75"></path>
              <path d="M48 6L40 18M48 6L56 18"></path>
              <path d="M48 90L40 78M48 90L56 78"></path>
              <path d="M12 48L24 40M12 48L24 56"></path>
              <path d="M84 48L72 40M84 48L72 56"></path>
            </g>
          </svg>
        </div>

        <div class="quote-panel" aria-hidden="true"></div>
        <div class="tn-message">
          <p data-message="true">The frost never asks the garden to hurry. It only asks it to wait for the light.</p>
        </div>
        <div class="quote-divider" aria-hidden="true">
          <svg data-cg-svg="" data-cg-preserve="" viewBox="0 0 140 16" fill="none" aria-hidden="true" focusable="false" style="--cg-fill:var(--text-high);--cg-stroke:var(--text-high);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)">
            <path d="M2 9C18 2 30 14 46 8C62 2 74 14 90 8C106 2 118 14 138 7" stroke="var(--cg-stroke)" stroke-width="2.4" stroke-linecap="round" opacity=".85"></path>
          </svg>
        </div>

        <div class="bottom-scrim" aria-hidden="true"></div>
        <div class="foot">
          <div class="lockup">
            <span class="brand-mark-clip"><img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E"></span>
            <span class="brand-word">YOURBRAND</span>
          </div>
        </div>
      </section>

    </div>
  

</body></html>
