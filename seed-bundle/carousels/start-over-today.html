<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap');

:root{
  --primary:var(--brand-primary,#6D4AFF);
  --secondary:var(--brand-secondary,#FF7AAE);
  --accent:var(--brand-accent,#FFC24B);
  --bg:var(--brand-bg,#F4EDFF);
  --surface:var(--brand-surface,#FFFFFF);
  --text-high:var(--brand-ink,var(--brand-text,#1B1533));
  --text-low:var(--brand-text-muted,rgba(27,21,51,.62));
  --border:var(--brand-border,rgba(255,255,255,.55));
  --highlight:var(--brand-accent,#FFC24B);
  --on-accent:var(--brand-on-accent,#1B1533);
  --on-primary:var(--brand-on-primary,#FFFFFF);
}

*{box-sizing:border-box;margin:0;padding:0;}

.si-single{width:fit-content;}

.si-page{
  position:relative;
  width:1080px;height:1080px;
  overflow:hidden;
  font-family:'Inter',sans-serif;
  background:var(--bg);
}

/* holographic blurred backdrop — decorative, full-bleed, brand-driven */
.holo{position:absolute;inset:0;overflow:hidden;z-index:0;filter:blur(95px) saturate(135%);}
.holo i{position:absolute;border-radius:50%;display:block;}
.holo i:nth-child(1){width:560px;height:560px;top:-140px;left:-120px;background:var(--accent);}
.holo i:nth-child(2){width:600px;height:600px;top:-100px;right:-160px;background:var(--secondary);}
.holo i:nth-child(3){width:640px;height:640px;bottom:-180px;right:-140px;background:var(--primary);}
.holo i:nth-child(4){width:560px;height:560px;bottom:-160px;left:-140px;background:var(--secondary);}
.holo i:nth-child(5){width:420px;height:420px;top:34%;left:32%;background:var(--surface);opacity:.55;}

/* glass card */
.card{
  position:relative;z-index:2;
  margin:206px 84px 0;
  width:912px;
  padding:60px 56px 52px;
  border-radius:44px;
  background:color-mix(in srgb, var(--surface) 74%, transparent);
  backdrop-filter:blur(30px) saturate(160%);
  -webkit-backdrop-filter:blur(30px) saturate(160%);
  border:1.5px solid var(--border);
  box-shadow:0 40px 90px rgba(20,10,40,.28), inset 0 1px 0 rgba(255,255,255,.5);
  display:flex;flex-direction:column;gap:34px;
}

.who{display:flex;align-items:center;gap:26px;}
.avatar-slot{width:132px;height:132px;flex:none;}
.who-stack{display:flex;flex-direction:column;gap:2px;min-width:0;}
.who-name{
  font-family:'Sora',sans-serif;font-weight:700;font-size:40px;line-height:1.15;
  color:var(--text-high);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.who-handle{
  font-family:'Inter',sans-serif;font-weight:500;font-size:26px;line-height:1.2;
  color:var(--text-low);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.quote-mark{
  width:64px;height:64px;border-radius:18px;flex:none;
  background:var(--primary);color:var(--on-primary);
  display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-weight:800;font-size:38px;line-height:1;
  margin-bottom:-10px;
}

h1.headline{
  font-family:'Sora',sans-serif;font-weight:600;font-size:52px;line-height:1.28;
  letter-spacing:-.01em;color:var(--text-high);
}

.actions{display:flex;align-items:center;gap:20px;margin-top:2px;}
.action-pill{
  display:inline-flex;align-items:center;justify-content:center;flex:none;
  width:56px;height:56px;border-radius:16px;
  background:color-mix(in srgb, var(--surface) 55%, transparent);
  border:1px solid var(--border);
}
.action-pill svg{width:26px;height:26px;}
.action-pill.like{background:var(--accent);border-color:transparent;}

/* avatar photo + glow — direct children of .si-page, absolutely positioned to align
   with the fixed-margin card above (no flex-centering ambiguity to fight) */
.avatar-glow{
  position:absolute;z-index:2;
  top:257.5px;left:131.5px;width:152px;height:152px;border-radius:50%;
  background:var(--accent);filter:blur(20px);opacity:.6;
}
.si-image{
  position:absolute;z-index:3;
  top:267.5px;left:141.5px;width:132px;height:132px;border-radius:50%;
  object-fit:cover;display:block;border:4px solid var(--primary);
  box-shadow:0 8px 20px rgba(20,10,40,.35);
}

.lockup-row{
  display:flex;align-items:center;gap:10px;width:fit-content;
  margin:30px auto 0;padding:10px 22px 10px 12px;border-radius:999px;
  background:color-mix(in srgb, var(--surface) 55%, transparent);
  backdrop-filter:blur(16px);border:1px solid var(--border);
  position:relative;z-index:2;
}
.brand-mark{height:28px;width:auto;max-width:40px;object-fit:contain;display:block;opacity:.8;}
.brand-word{font-family:'Sora',sans-serif;font-weight:700;font-size:20px;color:var(--text-high);letter-spacing:.01em;}
</style>
</head>
<body>
<div class="si-single">
  <div class="si-page">

    <div class="holo" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>

    <div class="card">
      <div class="who">
        <span class="avatar-slot" aria-hidden="true"></span>
        <span class="who-stack">
          <span class="who-name">Naomi Cole</span>
          <span class="who-handle">@naomicreates</span>
        </span>
      </div>

      <span class="quote-mark" aria-hidden="true">“</span>
      <h1 class="headline">You don't need permission to start over. One small decision today is enough.</h1>

      <div class="actions">
        <span class="action-pill reply" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="--cg-stroke:var(--primary);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)" aria-hidden="true" focusable="false" data-cg-svg="" data-cg-preserve=""><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" fill="none" stroke="var(--cg-stroke)"></path></svg>
        </span>
        <span class="action-pill retweet" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="--cg-stroke:var(--primary);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)" aria-hidden="true" focusable="false" data-cg-svg="" data-cg-preserve=""><path d="M17 1l4 4-4 4" fill="none" stroke="var(--cg-stroke)"></path><path d="M3 11V9a4 4 0 0 1 4-4h14" fill="none" stroke="var(--cg-stroke)"></path><path d="M7 23l-4-4 4-4" fill="none" stroke="var(--cg-stroke)"></path><path d="M21 13v2a4 4 0 0 1-4 4H3" fill="none" stroke="var(--cg-stroke)"></path></svg>
        </span>
        <span class="action-pill like" aria-hidden="true">
          <svg viewBox="0 0 24 24" stroke-width="1" style="--cg-fill:var(--on-accent);--cg-stroke:var(--on-accent);--cg-fill:var(--cg-fill);--cg-stroke:var(--cg-stroke);--cg-fill:var(--cg-fill);--cg-stroke:var(--cg-stroke)" aria-hidden="true" focusable="false" data-cg-svg="" data-cg-preserve=""><path d="M12 21s-7.5-4.6-10-9.3C.6 8.6 2 5 5.6 5c2 0 3.4 1 4.4 2.5C11 6 12.4 5 14.4 5 18 5 19.4 8.6 22 11.7 19.5 16.4 12 21 12 21z" fill="var(--cg-fill)" stroke="var(--cg-stroke)"></path></svg>
        </span>
      </div>
    </div>

    <div class="avatar-glow" aria-hidden="true"></div>
    <img class="si-image" data-image="true" data-image-size="1024x1024" data-image-prompt="Warm, candid headshot portrait of a friendly young woman with a genuine smile, soft natural daylight, shallow depth of field, shot close-up from the shoulders up, plain softly blurred background, editorial lifestyle photography style, no text, no logos" alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><rect width='100%25' height='100%25' fill='%23c9b8ff'/></svg>">

    <div class="lockup-row">
      <img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E">
      <span class="brand-word">YOURBRAND</span>
    </div>

  </div>
</div>


</body></html>
