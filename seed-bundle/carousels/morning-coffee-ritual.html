<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Jost:wght@400;500&display=swap');

:root{
  --primary:var(--brand-primary,#D89B6A);
  --secondary:var(--brand-secondary,#B5764A);
  --accent:var(--brand-accent,#E8B48A);
  --highlight:var(--brand-accent,#F2D6BC);
  --bg:var(--brand-bg,#E7CBB4);
  --surface:var(--brand-surface,#F4E3D4);
  --text-high:var(--brand-text-high,#FFFFFF);
  --text-low:var(--brand-text-muted,rgba(255,255,255,.82));
  --border:var(--brand-border,rgba(255,255,255,.55));
}

*{box-sizing:border-box;}

.si-single{width:fit-content;margin:0;}

.si-page{
  position:relative;width:1080px;height:1350px;overflow:hidden;
  container-type:inline-size;background:var(--bg);
  font-family:'Jost',sans-serif;
}

.photo{position:absolute;inset:0;z-index:0;}
.si-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;background:var(--bg);z-index:0;}

.scrim{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 66% 50% at 50% 44%, color-mix(in srgb, var(--secondary) 88%, black 30%) 0%, color-mix(in srgb, var(--secondary) 62%, black 20%) 46%, transparent 78%),
    linear-gradient(180deg, color-mix(in srgb, black 42%, transparent) 0%, transparent 26%, transparent 70%, color-mix(in srgb, black 58%, transparent) 100%);
}

.stage{
  position:relative;z-index:2;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:120px 120px;gap:28px;
}

.motif{width:110px;height:auto;color:var(--highlight);opacity:.95;}

.eyebrow{
  margin:0;font-family:'Jost',sans-serif;font-weight:500;
  font-size:clamp(13px,1.5cqw,17px);letter-spacing:.42em;
  text-transform:uppercase;color:var(--highlight);
  text-shadow:0 1px 14px color-mix(in srgb, black 70%, transparent);
  padding-bottom:4px;
}

.headline{
  margin:0;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
  font-size:clamp(38px,6.2cqw,66px);line-height:1.18;letter-spacing:.005em;
  color:var(--text-high);max-width:15ch;
  text-shadow:0 2px 24px color-mix(in srgb, black 65%, transparent);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;padding-bottom:10px;
}

.rule{width:120px;height:2px;background:var(--border);}

.body{
  margin:0;font-family:'Jost',sans-serif;font-weight:400;
  font-size:clamp(15px,1.75cqw,20px);line-height:1.55;letter-spacing:.13em;
  text-transform:uppercase;color:var(--text-high);max-width:30ch;
  text-shadow:0 1px 16px color-mix(in srgb, black 65%, transparent);
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:4;overflow:hidden;padding-bottom:10px;
}

.brand-word{
  font-family:'Jost',sans-serif;font-weight:500;font-size:20px;letter-spacing:.42em;
  text-transform:uppercase;color:var(--text-high);
  text-shadow:0 1px 14px color-mix(in srgb, black 75%, transparent);
}

.lockup{
  position:absolute;left:0;right:0;bottom:64px;z-index:3;
  display:flex;align-items:center;justify-content:center;gap:14px;
}
.brand-mark{height:26px;width:auto;max-width:100px;object-fit:contain;display:block;opacity:.9;}

/* occlusion-guard: semantic text slots always render above filled surfaces */
[data-title],[data-message],[data-cta],[data-tagline],[data-step],[data-kicker]{position:relative;z-index:30;}
</style>
</head>
<body>
<div class="si-single">
  <div class="si-page">
    <img class="si-image" data-image="true" data-image-size="1024x1536" alt="" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='5'><rect width='100%25' height='100%25' fill='%23b5764a'/></svg>">
    <div class="scrim" aria-hidden="true"></div>

    <div class="stage">
      <svg class="motif" viewBox="0 0 120 70" fill="none" data-cg-svg="" data-cg-preserve="" aria-hidden="true" focusable="false" style="--cg-fill:var(--highlight);--cg-stroke:var(--highlight);--cg-fill:var(--cg-stroke);--cg-stroke:var(--cg-stroke)">
        <path d="M8 46 C30 20 46 30 60 40 C74 30 90 20 112 46" stroke="var(--cg-stroke)" stroke-width="4" stroke-linecap="round" fill="none"></path>
        <path d="M52 40 C56 48 64 48 68 40" stroke="var(--cg-stroke)" stroke-width="4" stroke-linecap="round" fill="none"></path>
      </svg>
      <p class="eyebrow">A morning ritual</p>
      <h1 class="headline">The first quiet cup is a small daily ceremony</h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="body">Let the steam rise slowly, breathe before the day begins, and hold this warm moment as your own.</p>
    </div>

    <div class="lockup">
      <img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E">
      <span class="brand-word">YOURBRAND</span>
    </div>
  </div>
</div>

</body></html>
