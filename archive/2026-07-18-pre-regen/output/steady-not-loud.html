<!doctype html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Arimo:ital,wght@0,400;0,700;1,400;1,700&display=swap');

      :root{
        /* Reference reused ONE navy across title/hashtag/icons — we spread that same
           navy family across primary (title) / secondary (handle, hashtag, icons, rule)
           / accent (avatar fill) so a brand swap moves every one of those devices while
           the card surface + ink stay fixed for legibility (contract requirement). */
        --primary:var(--brand-primary,#073d56);
        --secondary:var(--brand-secondary,#0b5878);
        --accent:var(--brand-accent,#1f7a9c);
        --highlight:var(--brand-accent,#1f7a9c);
        --bg:var(--brand-bg,#efe9dd);
        --surface:var(--brand-surface,#fffdf8);
        --text-high:var(--brand-ink,var(--brand-text,#211d18));
        --text-low:var(--brand-text-muted,rgba(33,29,24,.6));
        --border:var(--brand-border,rgba(33,29,24,.16));
        --on-accent:var(--brand-on-accent,#ffffff);
      }

      *{box-sizing:border-box;}

      .ig-carousel{display:flex;width:max-content;min-height:1350px;background:#0c0c0c;}

      .slide{
        width:1080px;height:1350px;flex:none;position:relative;overflow:hidden;
        background:var(--bg);
        font-family:'Arimo',sans-serif;
      }

      /* ── paper grain, reproduced at the reference's real density (not a faint hint) ── */
      .grain{
        position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.4;mix-blend-mode:multiply;
        background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='1.6' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.13  0 0 0 0 0.12  0 0 0 0 0.09  0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        background-size:180px 180px;
      }

      /* ── top handle ── */
      .top-handle{position:absolute;top:112px;left:90px;right:90px;text-align:center;z-index:2;}
      .top-handle span{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        font-family:'Arimo',sans-serif;font-weight:700;font-size:32px;line-height:1.25;color:var(--secondary);
        letter-spacing:.01em;padding-bottom:.15em;
      }

      /* ── big display title ── */
      .tn-title{position:absolute;top:222px;left:90px;right:90px;text-align:center;z-index:2;}
      .tn-title h1{
        margin:0;font-family:'Archivo Black',sans-serif;font-weight:400;font-size:96px;line-height:1.05;
        letter-spacing:-.035em;color:var(--primary);
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;padding-bottom:.2em;
      }

      /* ── the floating tweet card — fixed cream literal, never re-skinned ── */
      .tweet-card{
        position:absolute;top:428px;left:140px;width:800px;height:452px;z-index:2;
        background:var(--surface);border-radius:32px;overflow:hidden;
        box-shadow:0 30px 60px rgba(20,16,10,.22),0 2px 8px rgba(20,16,10,.08);
        border:1px solid rgba(33,29,24,.06);
      }

      .card-head{position:absolute;top:52px;left:56px;right:56px;display:flex;align-items:center;z-index:1;}
      .avatar{
        flex:none;width:104px;height:104px;border-radius:50%;background:var(--accent);
        display:flex;align-items:center;justify-content:center;
      }
      .avatar span{font-family:'Arimo',sans-serif;font-weight:700;font-size:36px;color:var(--on-accent);}
      .head-names{margin-left:24px;display:flex;flex-direction:column;gap:4px;}
      .head-names .nm{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        font-family:'Arimo',sans-serif;font-weight:700;font-size:36px;color:var(--text-high);line-height:1.25;padding-bottom:.15em;
      }
      .head-names .hd{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        font-family:'Arimo',sans-serif;font-style:italic;font-weight:400;font-size:32px;color:var(--text-low);line-height:1.25;padding-bottom:.15em;
      }

      .card-close{position:absolute;top:48px;right:52px;width:36px;height:36px;color:rgba(33,29,24,.32);z-index:1;}

      .tn-message{position:absolute;top:198px;left:56px;right:56px;}
      .tn-message p{
        margin:0;font-family:'Arimo',sans-serif;font-weight:400;font-size:38px;line-height:1.32;
        color:var(--text-high);
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;padding-bottom:.18em;
      }

      .card-foot{position:absolute;bottom:44px;left:56px;right:52px;display:flex;align-items:center;justify-content:space-between;z-index:1;}
      .hashtag{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        font-family:'Arimo',sans-serif;font-weight:700;font-size:34px;color:var(--secondary);line-height:1.25;padding-bottom:.15em;
      }
      .icon-row{display:flex;align-items:center;gap:26px;}
      .icon-row svg{width:34px;height:34px;color:var(--secondary);}

      /* ── footer tagline + rule ── */
      .tn-tagline{position:absolute;top:938px;left:120px;right:120px;text-align:center;z-index:2;}
      .tn-tagline span{
        margin:0;font-family:'Arimo',sans-serif;font-weight:400;font-size:34px;line-height:1.3;
        color:var(--text-low);
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;padding-bottom:.15em;
      }

      .rule{position:absolute;top:1046px;left:150px;right:150px;height:4px;background:var(--secondary);z-index:2;}

      /* ── brand lockup ── */
      .foot{position:absolute;left:0;right:0;top:1104px;z-index:2;display:flex;align-items:center;justify-content:center;gap:14px;}
      .brand-mark-clip{flex:none;height:30px;display:flex;align-items:center;}
      .brand-mark{height:30px;width:auto;max-width:110px;object-fit:contain;display:block;}
      .brand-word{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        font-family:'Arimo',sans-serif;font-weight:700;font-size:24px;line-height:1.25;color:var(--primary);
        letter-spacing:.05em;white-space:nowrap;padding-bottom:.15em;
      }
    </style>
  </head>

  <body>
    <div class="ig-carousel">

      <section class="slide" data-cg-slide-type="text">
        <div class="grain" aria-hidden="true"></div>

        <div class="top-handle"><span>@steadyandsure</span></div>

        <div class="tn-title"><h1 data-title="true">quiet resilience.</h1></div>

        <div class="tweet-card">
          <div class="card-head">
            <div class="avatar"><span>NC</span></div>
            <div class="head-names">
              <span class="nm">Naomi Cole</span>
              <span class="hd">@steadyandsure</span>
            </div>
          </div>
          <svg class="card-close" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>

          <div class="tn-message"><p data-message="true">You don&rsquo;t have to be loud to be sure of yourself. Steady beats loud, every time.</p></div>

          <div class="card-foot">
            <span class="hashtag">#staysteady</span>
            <div class="icon-row">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14 4L21 12L14 20M21 12H9C6 12 4 14 4 17V19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 11.5C21 16.19 16.97 20 12 20C10.86 20 9.77 19.8 8.77 19.43L4 20.5L5.24 16.62C4.46 15.24 4 13.68 4 12C4 7.31 8.03 3.5 12 3.5C16.97 3.5 21 6.81 21 11.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 20.5C12 20.5 3.5 15.6 3.5 9.6C3.5 6.8 5.6 4.9 8.2 4.9C10 4.9 11.3 5.9 12 7.1C12.7 5.9 14 4.9 15.8 4.9C18.4 4.9 20.5 6.8 20.5 9.6C20.5 15.6 12 20.5 12 20.5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>

        <div class="tn-tagline"><span data-tagline="true">Small steps still count as forward.</span></div>

        <div class="rule"></div>

        <div class="foot">
          <span class="brand-mark-clip"><img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E"/></span>
          <span class="brand-word">YOURBRAND</span>
        </div>
      </section>

    </div>
  </body>
</html>
