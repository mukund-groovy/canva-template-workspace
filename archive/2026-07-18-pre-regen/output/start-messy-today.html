<!doctype html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');

  :root{
    /* Role tokens. Brand preview re-skins --primary/--secondary/--accent; the white
       card surface + its ink stay fixed literals so the "tweet card" reading surface
       holds AA-legible under any palette. The full-bleed field behind the card IS a
       bound --primary panel (not the raw .slide bg) so the deck keeps the reference's
       one-flat-saturated-colour reading while .slide{background:var(--bg)} still
       holds the required fixed fallback tone underneath it. */
    --primary:var(--brand-primary,#C9552F);
    --secondary:var(--brand-secondary,#8F3A1C);
    --accent:var(--brand-accent,#F2A65A);
    --highlight:var(--brand-accent,#F2A65A);
    --bg:var(--brand-bg,#FFF8F0);
    --surface:var(--brand-surface,#FFFFFF);
    --text-high:var(--brand-ink,var(--brand-text,#211A15));
    --text-low:var(--brand-text-muted,rgba(33,26,21,.6));
    --border:var(--brand-border,rgba(33,26,21,.13));
    --on-primary:var(--brand-on-primary,#FFFFFF);
    --on-accent:var(--brand-on-accent,#2A1608);
  }

  *{box-sizing:border-box;}

  .ig-carousel{display:flex;width:max-content;min-height:1350px;background:#0c0c0c;}

  .slide{
    width:1080px;height:1350px;flex:none;position:relative;overflow:hidden;
    background:var(--bg);font-family:'Poppins',sans-serif;
  }

  /* ── full-bleed brand field: this is the reference's "one flat saturated colour"
     read, reproduced at full strength as its own bound layer ── */
  .bg-panel{position:absolute;inset:0;z-index:0;background:var(--primary);}

  /* ── top overline, sits directly on the brand field → on-primary, never a literal ── */
  .overline{position:absolute;left:60px;right:60px;top:92px;text-align:center;z-index:2;}
  .overline span{
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
    font-family:'Poppins',sans-serif;font-weight:700;font-size:30px;line-height:1.3;
    letter-spacing:.22em;text-transform:uppercase;color:var(--on-primary);padding-bottom:.1em;
  }

  /* ── the card: fixed white surface, never re-skinned ── */
  .card{
    position:absolute;left:90px;top:300px;width:900px;height:700px;z-index:2;
    background:var(--surface);border-radius:36px;
    box-shadow:0 34px 64px rgba(20,10,5,.34);
  }

  .avatar{
    position:absolute;left:156px;top:360px;width:104px;height:104px;z-index:3;
    border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;
  }
  .avatar span{font-family:'Poppins',sans-serif;font-weight:700;font-size:34px;color:var(--on-accent);}

  .name-row{position:absolute;left:280px;top:368px;right:156px;z-index:3;
    display:flex;align-items:center;gap:10px;}
  .name-row span{
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
    font-family:'Poppins',sans-serif;font-weight:700;font-size:34px;line-height:1.3;
    color:var(--text-high);padding-bottom:.08em;white-space:nowrap;
  }
  .name-row svg{flex:none;width:28px;height:28px;}

  .handle-row{position:absolute;left:280px;top:418px;right:156px;z-index:3;}
  .handle-row span{
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
    font-family:'Poppins',sans-serif;font-weight:400;font-size:27px;line-height:1.3;
    color:var(--text-low);padding-bottom:.1em;
  }

  .rule{position:absolute;left:156px;right:156px;top:492px;height:2px;background:var(--border);z-index:2;}

  /* ── quote: ink line + brand-filled continuation bar (survives content swaps,
     unlike a nested inline span which textContent overwrite would erase) ── */
  .tn-title{position:absolute;left:156px;right:156px;top:528px;z-index:3;}
  .tn-title h1{
    margin:0;font-family:'Poppins',sans-serif;font-weight:800;font-size:58px;line-height:1.15;
    letter-spacing:-.01em;color:var(--text-high);
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;padding-bottom:.14em;
  }

  .tn-tag{position:absolute;left:156px;right:156px;top:679px;z-index:3;}
  .tn-tag h2{
    margin:0;font-family:'Poppins',sans-serif;font-weight:800;font-size:58px;line-height:1.15;
    letter-spacing:-.01em;color:var(--text-high);
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;padding-bottom:.14em;
  }

  .tn-message{position:absolute;left:156px;right:156px;top:800px;z-index:3;}
  .tn-message p{
    margin:0;font-family:'Poppins',sans-serif;font-weight:400;font-size:30px;line-height:1.42;
    color:var(--text-low);
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden;padding-bottom:.3em;
  }

  /* ── card footer: timestamp + the brand lockup, in the exact spot the reference
     gave its own "Your Brand Name" mention ── */
  .card-foot{position:absolute;left:156px;right:156px;top:944px;z-index:3;
    display:flex;align-items:center;gap:14px;}
  .card-foot .time{
    font-family:'Poppins',sans-serif;font-weight:400;font-size:26px;line-height:1.3;
    color:var(--text-low);white-space:nowrap;
  }
  .lockup{display:inline-flex;align-items:center;gap:10px;}
  .brand-mark{height:26px;width:auto;max-width:96px;object-fit:contain;display:block;}
  .brand-word{
    font-family:'Poppins',sans-serif;font-weight:700;font-size:26px;line-height:1.3;
    color:var(--text-low);white-space:nowrap;
  }

  /* ── bottom-of-canvas handle mention, on the brand field → on-primary ── */
  .bottom-handle{position:absolute;left:60px;right:60px;top:1174px;text-align:center;z-index:2;}
  .bottom-handle span{
    display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
    font-family:'Poppins',sans-serif;font-weight:600;font-size:30px;line-height:1.3;
    color:var(--on-primary);padding-bottom:.12em;
  }
</style>
</head>

<body>
<div class="ig-carousel">

  <section class="slide" data-cg-slide-type="text">
    <div class="bg-panel" aria-hidden="true"></div>

    <div class="overline"><span>Studio Notes</span></div>

    <div class="card"></div>

    <div class="avatar" aria-hidden="true"><span>WA</span></div>

    <div class="name-row">
      <span>Wren Ashby</span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="11" fill="var(--accent)"/><path d="M7 12.4l3.2 3.2L17 9" stroke="var(--on-accent)" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="handle-row"><span>@messydeskstudio</span></div>

    <div class="rule"></div>

    <div class="tn-title"><h1 data-title="true">You don't need permission</h1></div>
    <div class="tn-tag"><h2 data-tagline="true">to make something bad.</h2></div>
    <div class="tn-message"><p data-message="true">The good version only ever shows up after the bad one gets out of your head.</p></div>

    <div class="card-foot">
      <span class="time">9:41 AM &nbsp;&middot;&nbsp; Jul 14</span>
      <span class="lockup"><img class="brand-mark" data-brand-logo="" alt="" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2024%2024%22%3E%3Crect%20width=%2224%22%20height=%2224%22%20rx=%226%22%20fill=%22%23808080%22%20fill-opacity=%220.35%22/%3E%3C/svg%3E"/><span class="brand-word">YOURBRAND</span></span>
    </div>

    <div class="bottom-handle"><span>@messydeskstudio</span></div>
  </section>

</div>
</body>
</html>
