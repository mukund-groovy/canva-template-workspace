<!doctype html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Georgia&display=swap');

      :root{
        /* Brand roles — the kicker pill, quote-mark glyph and avatar ring are the
           re-skinnable devices; the lavender field, cream card and ink text stay
           fixed literals so the "quote card" reading surface stays AA-legible
           under any brand palette. */
        --primary:var(--brand-primary,#6E76BE);
        --secondary:var(--brand-secondary,#4A4F86);
        --accent:var(--brand-accent,#8790D6);
        --highlight:var(--brand-accent,#8790D6);
        --bg:var(--brand-bg,#CDD1E8);
        --surface:var(--brand-surface,var(--brand-bg-alt,#FAF6EE));
        --text-high:var(--brand-ink,var(--brand-text,#363A66));
        --text-low:var(--brand-text-muted,rgba(54,58,102,.62));
        --border:var(--brand-border,rgba(54,58,102,.14));
        --on-accent:var(--brand-on-accent,#ffffff);
        --on-primary:var(--brand-on-primary,#ffffff);
      }

      *{box-sizing:border-box;}

      .ig-carousel{display:flex;width:max-content;min-height:1080px;background:#0c0c0c;}

      .slide{
        width:1080px;height:1080px;flex:none;position:relative;overflow:hidden;
        background:var(--bg);
        font-family:'Inter',sans-serif;
      }

      /* ── background: layered organic blobs, hand-drawn energy ── */
      .blobfield{position:absolute;inset:0;z-index:0;}

      /* ── thin zigzag squiggle line-art, corner flourish ── */
      .zig{position:absolute;z-index:1;opacity:.55;}
      .zig svg{display:block;}

      /* ── the floating blob-shaped quote card ── */
      .card{
        position:absolute;left:90px;top:230px;width:900px;height:660px;z-index:2;
        background:var(--surface);
        border-radius:130px 240px 150px 230px / 220px 150px 230px 130px;
        box-shadow:0 30px 60px rgba(30,24,54,.24);
      }

      /* ── giant decorative quotation mark, anchored on the card surface ── */
      .quote-mark{
        position:absolute;top:266px;left:158px;z-index:3;
        font-family:Georgia,'Times New Roman',serif;font-weight:700;
        font-size:172px;line-height:.62;color:var(--secondary);
        user-select:none;
      }

      /* ── kicker tag, sits under the avatar — a real brand-bound device.
         The pill (fill+padding) and the clamped text run are separate elements:
         padding on the same node as -webkit-line-clamp inflates scrollHeight past
         the clamp heuristic's budget and reads as a false clip. ── */
      .kicker-wrap{position:absolute;top:428px;left:606px;width:460px;z-index:4;text-align:center;}
      .pill{
        display:inline-block;max-width:100%;
        background:var(--accent);border-radius:999px;padding:12px 24px 14px;
      }
      .kicker{
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        color:var(--on-accent);white-space:nowrap;
        font-family:'Inter',sans-serif;font-weight:800;font-size:20px;
        text-transform:uppercase;line-height:1.25;
      }

      /* ── the quote itself — the one body paragraph ── */
      .quote-wrap{position:absolute;top:498px;left:160px;width:760px;z-index:3;}
      .quote-wrap p{
        margin:0;font-family:'Inter',sans-serif;font-weight:700;font-size:36px;line-height:1.28;
        letter-spacing:-.005em;color:var(--text-high);text-align:center;
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:6;overflow:hidden;
        padding-bottom:.22em;
      }

      /* ── invented persona handle, fixed decorative literal ── */
      .handle-wrap{position:absolute;top:814px;left:160px;width:760px;z-index:3;}
      .handle{
        display:block;font-family:'Inter',sans-serif;font-weight:700;font-style:italic;
        font-size:29px;color:var(--secondary);text-align:center;
        display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:1;overflow:hidden;
        padding-bottom:.18em;
      }

      /* ── circular profile avatar, overlapping the card's top-right corner ── */
      .avatar{
        position:absolute;top:146px;right:104px;width:264px;height:264px;z-index:5;
        border-radius:50%;overflow:hidden;
        box-shadow:0 0 0 10px var(--surface),0 0 0 17px var(--accent),0 22px 40px rgba(30,24,54,.28);
      }
      .avatar img{width:100%;height:100%;object-fit:cover;display:block;background:#c9c4bb;}

      /* ── brand lockup, bottom-left of the canvas ── */
      .foot{position:absolute;left:74px;bottom:52px;z-index:6;display:flex;align-items:center;gap:14px;}
      .brand-mark-clip{flex:none;height:32px;display:flex;align-items:center;}
      .brand-mark{height:32px;width:auto;max-width:110px;object-fit:contain;display:block;}
      .brand-word{font-family:'Inter',sans-serif;font-weight:800;font-size:24px;color:var(--secondary);white-space:nowrap;letter-spacing:.01em;}
    </style>
  </head>
